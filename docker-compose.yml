services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundval}
      POSTGRES_USER: ${POSTGRES_USER:-fundval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fundval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 暴露 5432 到 WSL 主机 (Windows 客户端通过 localhost:5432 连)
    # 镜像模式下 Windows localhost 直达 WSL localhost, 不需要 netsh portproxy
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundval}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      fundval:
        ipv4_address: 10.89.0.2   # 固定 IP (治本 — podman 3.4.4 dnsname 不可靠, ipv4_address 是唯一稳定方案)

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    # 不暴露端口到宿主机，仅容器内通信
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      fundval:
        ipv4_address: 10.89.0.3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fundval-backend:local
    # 2026-06-07 治本组合: ipv4_address 固定 IP + extra_hosts 写入对应解析
    # (podman 3.4.4 dnsname 插件不工作, 必须 extra_hosts 兜底)
    # IP 永远是 db=0.2, redis=0.3 — 任何重启不漂
    extra_hosts:
      - "db:10.89.0.2"
      - "redis:10.89.0.3"
    command: gunicorn fundval.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --timeout ${GUNICORN_TIMEOUT:-90} --access-logfile - --error-logfile -
    volumes:
      # 生产环境：只挂载配置目录，不挂载代码
      # 开发环境：取消注释下面这行以挂载本地代码
      # - ./backend:/app
      - config_data:/app/config
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only-change-in-production}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      fundval:
        ipv4_address: 10.89.0.4

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fundval-backend:local
    # 2026-06-07 治本组合
    extra_hosts:
      - "db:10.89.0.2"
      - "redis:10.89.0.3"
    entrypoint: []
    command: celery -A fundval worker -l ${CELERY_LOGLEVEL:-info}
    volumes:
      # 生产环境：只挂载配置目录
      # - ./backend:/app
      - config_data:/app/config
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only-change-in-production}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      fundval:
        ipv4_address: 10.89.0.5

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fundval-backend:local
    # 2026-06-07 治本组合
    extra_hosts:
      - "db:10.89.0.2"
      - "redis:10.89.0.3"
    entrypoint: []
    command: celery -A fundval beat -l ${CELERY_LOGLEVEL:-info}
    volumes:
      # 生产环境：只挂载配置目录
      # - ./backend:/app
      - config_data:/app/config
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only-change-in-production}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      fundval:
        ipv4_address: 10.89.0.6

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: fundval-frontend:local
    # 2026-06-07 治本: 删 extra_hosts, 用 entrypoint 扫描 subnet 找 backend
    ports:
      - "${FRONTEND_PORT:-21345}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      fundval:
        ipv4_address: 10.89.0.7

volumes:
  postgres_data:
  config_data:

networks:
  fundval:
    driver: bridge
    # 2026-06-07 治本: 用 ipam 固定子网
    # noble podman 4.9.3 default net 占用 10.88.0.0/24, 改用 10.89.0.0/24 避开
    # entrypoint 也要同步改 subnet 扫描范围
    ipam:
      config:
        - subnet: 10.89.0.0/24
